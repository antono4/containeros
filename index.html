<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="containeros - by Antono4">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ContainerOS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Inter', sans-serif;
        }

        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #121218;
            --bg-card: #1a1a22;
            --accent-purple: #8b5cf6;
            --accent-blue: #3b82f6;
            --accent-pink: #ec4899;
            --accent-green: #10b981;
            --accent-orange: #f59e0b;
            --text-primary: #ffffff;
            --text-secondary: #9ca3af;
            --text-muted: #6b7280;
        }

        html, body {
            height: 100%;
            overflow: hidden;
            background: var(--bg-primary);
            color: var(--text-primary);
        }

        /* Main Container */
        .main-container {
            width: 100%;
            height: 100%;
            max-width: 480px;
            margin: 0 auto;
            background: var(--bg-primary);
            position: relative;
            overflow: hidden;
        }

        /* Ambient Background */
        .ambient-bg {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            overflow: hidden;
            z-index: 0;
        }

        .ambient-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            animation: float 20s ease-in-out infinite;
        }

        .ambient-orb.purple {
            width: 300px;
            height: 300px;
            background: var(--accent-purple);
            top: -100px;
            right: -50px;
        }

        .ambient-orb.blue {
            width: 250px;
            height: 250px;
            background: var(--accent-blue);
            bottom: 20%;
            left: -80px;
            animation-delay: -10s;
        }

        .ambient-orb.pink {
            width: 200px;
            height: 200px;
            background: var(--accent-pink);
            bottom: -50px;
            right: 20%;
            animation-delay: -5s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -30px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
        }

        /* Status Bar */
        .status-bar {
            position: relative;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            font-size: 14px;
            font-weight: 500;
        }

        .status-time {
            font-weight: 600;
        }

        .status-icons {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .status-icons i {
            font-size: 14px;
        }

        /* Content Area */
        .content-area {
            position: relative;
            z-index: 10;
            height: calc(100% - 90px);
            overflow-y: auto;
            overflow-x: hidden;
            padding: 0 20px;
            scroll-behavior: smooth;
        }

        .content-area::-webkit-scrollbar {
            display: none;
        }

        /* Header Section */
        .header-section {
            padding-top: 10px;
            margin-bottom: 24px;
        }

        .greeting {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .user-name {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Quick Stats */
        .quick-stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 16px;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
        }

        .stat-card.purple::before { background: var(--accent-purple); }
        .stat-card.blue::before { background: var(--accent-blue); }
        .stat-card.green::before { background: var(--accent-green); }
        .stat-card.orange::before { background: var(--accent-orange); }

        .stat-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
            font-size: 16px;
        }

        .stat-card.purple .stat-icon { background: rgba(139, 92, 246, 0.2); color: var(--accent-purple); }
        .stat-card.blue .stat-icon { background: rgba(59, 130, 246, 0.2); color: var(--accent-blue); }
        .stat-card.green .stat-icon { background: rgba(16, 185, 129, 0.2); color: var(--accent-green); }
        .stat-card.orange .stat-icon { background: rgba(245, 158, 11, 0.2); color: var(--accent-orange); }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 2px;
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-muted);
        }

        /* Weather Card */
        .weather-card {
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.3), rgba(59, 130, 246, 0.3));
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
        }

        .weather-main {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .weather-icon {
            font-size: 48px;
        }

        .weather-temp {
            font-size: 42px;
            font-weight: 700;
        }

        .weather-info {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .weather-location {
            font-size: 16px;
            font-weight: 500;
            margin-top: 2px;
        }

        .weather-details {
            text-align: right;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .weather-details div {
            margin-bottom: 4px;
        }

        /* Section Title */
        .section-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .section-title span {
            color: var(--accent-purple);
        }

        .see-all {
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 500;
        }

        /* Apps Grid */
        .apps-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px 12px;
            margin-bottom: 24px;
        }

        .app-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .app-item:active {
            transform: scale(0.95);
        }

        .app-icon {
            width: 56px;
            height: 56px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-bottom: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            position: relative;
        }

        .app-icon i {
            color: white;
        }

        .app-name {
            font-size: 12px;
            color: var(--text-secondary);
            text-align: center;
        }

        /* Bottom Navigation */
        .bottom-nav {
            position: relative;
            z-index: 100;
            background: var(--bg-secondary);
            border-top: 1px solid rgba(255,255,255,0.05);
            padding: 12px 20px;
            padding-bottom: max(12px, env(safe-area-inset-bottom));
        }

        .nav-items {
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            padding: 8px 16px;
            border-radius: 12px;
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .nav-item:active {
            background: rgba(139, 92, 246, 0.15);
        }

        .nav-item i {
            font-size: 20px;
            color: var(--text-muted);
            transition: color 0.2s;
        }

        .nav-item.active i {
            color: var(--accent-purple);
        }

        .nav-item span {
            font-size: 10px;
            color: var(--text-muted);
            font-weight: 500;
        }

        .nav-item.active span {
            color: var(--accent-purple);
        }

        .nav-item.home {
            position: relative;
            margin-top: -30px;
        }

        .nav-item.home .nav-icon-wrap {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-pink));
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(139, 92, 246, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .nav-item.home:active .nav-icon-wrap {
            transform: scale(0.9);
            box-shadow: 0 2px 10px rgba(139, 92, 246, 0.3);
        }

        .nav-item.home i {
            font-size: 24px;
            color: white;
        }

        /* App Window Modal */
        .app-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--bg-primary);
            z-index: 200;
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .app-modal.active {
            visibility: visible;
            opacity: 1;
        }

        .modal-header {
            display: flex;
            align-items: center;
            padding: 16px 20px;
            gap: 16px;
            flex-shrink: 0;
        }

        .modal-back {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: var(--bg-card);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: none;
            color: var(--text-primary);
            font-size: 16px;
            transition: background 0.2s;
        }

        .modal-back:hover {
            background: var(--bg-secondary);
        }

        .modal-back:active {
            background: rgba(139, 92, 246, 0.3);
            transform: scale(0.95);
        }

        .modal-title {
            font-size: 18px;
            font-weight: 600;
            flex: 1;
        }

        .modal-actions {
            display: flex;
            gap: 8px;
        }

        .modal-action {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: var(--bg-card);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: none;
            color: var(--text-secondary);
            font-size: 16px;
            transition: background 0.2s;
        }

        .modal-action:hover {
            background: var(--bg-secondary);
        }

        .modal-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            padding-bottom: 40px;
        }

        /* Calculator */
        .calc-display {
            text-align: right;
            padding: 30px 20px;
            background: var(--bg-card);
            border-radius: 20px;
            margin-bottom: 20px;
        }

        .calc-expr {
            font-size: 18px;
            color: var(--text-muted);
            min-height: 24px;
        }

        .calc-result {
            font-size: 48px;
            font-weight: 300;
        }

        .calc-buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        .calc-btn {
            aspect-ratio: 1;
            border: none;
            border-radius: 16px;
            font-size: 24px;
            font-weight: 500;
            cursor: pointer;
            transition: transform 0.15s, opacity 0.15s;
        }

        .calc-btn:active {
            transform: scale(0.92);
            opacity: 0.8;
        }

        .calc-btn.func {
            background: var(--bg-card);
            color: var(--text-primary);
        }

        .calc-btn.num {
            background: var(--bg-secondary);
            color: var(--text-primary);
        }

        .calc-btn.op {
            background: var(--accent-purple);
            color: white;
        }

        .calc-btn.zero {
            grid-column: span 2;
            aspect-ratio: auto;
        }

        /* Settings List */
        .settings-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .settings-item {
            display: flex;
            align-items: center;
            padding: 16px;
            background: var(--bg-card);
            border-radius: 16px;
            gap: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .settings-item:active {
            background: var(--bg-secondary);
        }

        .settings-item .icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .settings-item .info {
            flex: 1;
        }

        .settings-item .info .title {
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 2px;
        }

        .settings-item .info .desc {
            font-size: 13px;
            color: var(--text-muted);
        }

        .settings-item i.fa-chevron-right {
            color: var(--text-muted);
            font-size: 14px;
        }

        /* Music Player */
        .music-player {
            text-align: center;
            padding: 40px 20px;
        }

        .music-cover {
            width: 280px;
            height: 280px;
            margin: 0 auto 30px;
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-pink));
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 100px;
            box-shadow: 0 20px 40px rgba(139, 92, 246, 0.3);
        }

        .music-info {
            margin-bottom: 30px;
        }

        .music-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .music-artist {
            font-size: 16px;
            color: var(--text-secondary);
        }

        .music-progress {
            margin-bottom: 30px;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: var(--bg-card);
            border-radius: 2px;
            margin-bottom: 8px;
            overflow: hidden;
        }

        .progress-fill {
            width: 35%;
            height: 100%;
            background: var(--accent-purple);
            border-radius: 2px;
        }

        .progress-time {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: var(--text-muted);
        }

        .music-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
        }

        .music-controls i {
            font-size: 24px;
            color: var(--text-secondary);
        }

        .music-controls .play-btn {
            width: 64px;
            height: 64px;
            background: var(--accent-purple);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
            box-shadow: 0 8px 25px rgba(139, 92, 246, 0.4);
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--bg-card);
            color: var(--text-primary);
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 14px;
            opacity: 0;
            transition: all 0.3s;
            z-index: 300;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* Calendar */
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .calendar-month {
            font-size: 20px;
            font-weight: 600;
        }

        .calendar-nav {
            display: flex;
            gap: 8px;
        }

        .calendar-nav button {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: var(--bg-card);
            border: none;
            color: var(--text-primary);
            cursor: pointer;
            font-size: 16px;
        }

        .calendar-weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            margin-bottom: 8px;
        }

        .calendar-weekdays span {
            font-size: 12px;
            color: var(--text-muted);
            padding: 8px 0;
        }

        .calendar-days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
        }

        .calendar-day {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            border-radius: 50%;
            cursor: pointer;
        }

        .calendar-day:hover {
            background: var(--bg-card);
        }

        .calendar-day.today {
            background: var(--accent-purple);
            color: white;
        }

        .calendar-day.other {
            color: var(--text-muted);
        }

        /* Notes */
        .notes-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .note-item {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 16px;
        }

        .note-item .note-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .note-item .note-preview {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .note-item .note-date {
            font-size: 12px;
            color: var(--text-muted);
        }

        /* Files */
        .files-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .file-item {
            display: flex;
            align-items: center;
            padding: 14px;
            background: var(--bg-card);
            border-radius: 14px;
            gap: 14px;
            cursor: pointer;
        }

        .file-item:active {
            background: var(--bg-secondary);
        }

        .file-item .icon {
            width: 44px;
            height: 44px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .file-item .info {
            flex: 1;
        }

        .file-item .info .name {
            font-size: 15px;
            font-weight: 500;
        }

        .file-item .info .meta {
            font-size: 12px;
            color: var(--text-muted);
        }

        .file-item i.fa-chevron-right {
            color: var(--text-muted);
            font-size: 14px;
        }

        /* Phone */
        .phone-display {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 24px;
            text-align: center;
            margin-bottom: 16px;
        }

        .phone-number {
            font-size: 32px;
            letter-spacing: 2px;
            min-height: 48px;
        }

        .phone-keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            padding: 16px;
            background: var(--bg-card);
            border-radius: 20px;
        }

        .phone-btn {
            aspect-ratio: 1.5;
            border: none;
            border-radius: 50%;
            background: var(--bg-secondary);
            color: white;
            font-size: 24px;
            font-weight: 400;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: transform 0.15s, opacity 0.15s, background 0.15s;
        }

        .phone-btn:active {
            background: var(--accent-purple);
            transform: scale(0.92);
            opacity: 0.8;
        }

        .phone-btn .sub {
            font-size: 9px;
            opacity: 0.6;
            letter-spacing: 1px;
        }

        .phone-actions {
            display: flex;
            justify-content: center;
            gap: 40px;
            padding: 20px;
            background: var(--bg-card);
            border-radius: 20px;
            margin-top: 16px;
        }

        .phone-action {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            cursor: pointer;
            transition: transform 0.15s, opacity 0.15s;
        }

        .phone-action:active {
            transform: scale(0.92);
            opacity: 0.8;
        }

        .phone-action.call {
            background: var(--accent-green);
            color: white;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4);
        }

        .phone-action.backspace {
            background: var(--bg-secondary);
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <div class="ambient-bg">
        <div class="ambient-orb purple"></div>
        <div class="ambient-orb blue"></div>
        <div class="ambient-orb pink"></div>
    </div>

    <div class="main-container">
        <!-- Status Bar -->
        <div class="status-bar">
            <span class="status-time" id="statusTime">9:41</span>
            <div class="status-icons">
                <i class="fas fa-signal"></i>
                <i class="fas fa-wifi"></i>
                <i class="fas fa-battery-full"></i>
            </div>
        </div>

        <!-- Content Area -->
        <div class="content-area">
            <!-- Header -->
            <div class="header-section">
                <div class="greeting">Good Morning,</div>
                <div class="user-name">User</div>
            </div>

            <!-- Quick Stats -->
            <div class="quick-stats">
                <div class="stat-card purple">
                    <div class="stat-icon"><i class="fas fa-microchip"></i></div>
                    <div class="stat-value">98%</div>
                    <div class="stat-label">CPU Usage</div>
                </div>
                <div class="stat-card blue">
                    <div class="stat-icon"><i class="fas fa-memory"></i></div>
                    <div class="stat-value">16 GB</div>
                    <div class="stat-label">RAM</div>
                </div>
                <div class="stat-card green">

            document.getElementById('appModal').classList.remove('active');

                closeApp();

            const toast = document.getElementById('toast');
            toast.textContent = message;

            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        let calcStr = '';
        function calcNum(n) {
            calcStr += n;
            document.getElementById('calcExpr').textContent = calcStr;
            try { document.getElementById('calcResult').textContent = eval(calcStr); } catch {}
        }
        function calcSetOp(op) {
            calcStr += op;
            document.getElementById('calcExpr').textContent = calcStr;
        }
        function calcEquals() {
            try {
                document.getElementById('calcResult').textContent = eval(calcStr);
                calcStr = '';
            } catch {}
        }
        function calcClear() { calcStr = ''; document.getElementById('calcExpr').textContent = ''; document.getElementById('calcResult').textContent = '0'; }
        function calcPlusMinus() { calcStr = '-' + calcStr; }
        function calcPercent() { calcStr += '/100'; }

        function phoneNum(n) {
            phoneNumStr += n;
            document.getElementById('phoneNumber').textContent = '+62 ' + phoneNumStr;

        function phoneBack() {
            phoneNumStr = phoneNumStr.slice(0, -1);
            document.getElementById('phoneNumber').textContent = '+62 ' + (phoneNumStr || '');

        // Calendar
        let calMonth2, calYear2;
        function renderCal() {
            const daysEl = document.getElementById('calDays');
            const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
            document.getElementById('calMonth').textContent = months[calMonth2] + ' ' + calYear2;
            
            let html = '';
            const firstDay = new Date(calYear2, calMonth2, 1).getDay();
            const daysInMonth = new Date(calYear2, calMonth2 + 1, 0).getDate();
            const today = new Date();
            
            for (let i = 0; i < firstDay; i++) {
                const prev = new Date(calYear2, calMonth2, 0).getDate();
                html += `<div class="calendar-day other">${prev - firstDay + i + 1}</div>`;
            }
            
            for (let d = 1; d <= daysInMonth; d++) {
                const isToday = d === today.getDate() && calMonth2 === today.getMonth() && calYear2 === today.getFullYear();
                html += `<div class="calendar-day${isToday ? ' today' : ''}">${d}</div>`;
            }
            
            daysEl.innerHTML = html;
        }
        function calPrev() { calMonth2--; if (calMonth2 < 0) { calMonth2 = 11; calYear2--; } renderCal(); }
        function calNext() { calMonth2++; if (calMonth2 > 11) { calMonth2 = 0; calYear2++; } renderCal(); }
